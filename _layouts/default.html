  <span style="--i:5"></span>
  <span style="--i:6"></span>
  <span style="--i:7"></span>
  <span style="--i:8"></span>
  <span style="--i:9"></span>
  <span style="--i:10"></span>
  <span style="--i:11"></span>
  <span style="--i:12"></span>
</div>
  <div class="page-transition"></div>
  <div class="page-loader" id="pageLoader">
  <img src="{{ '/assets/img/jorgemaialogomarcasemfundo.png' | relative_url }}" alt="Jorge Maia">
</div>
  <div class="noise-texture" aria-hidden="true"></div>
  <div class="neon-orbs" aria-hidden="true">

    <span class="orb orb-2"></span>

  <div class="page-transition">
  <main>{{ content }}</main>
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script>
    document.querySelectorAll('.mouse-glow').forEach(card => {

      card.addEventListener('mousemove', e => {

        const rect = card.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        card.style.setProperty('--x', `${x}px`);
        card.style.setProperty('--y', `${y}px`);
      });

    });
  </script>
  <script>

const loader = document.getElementById('pageLoader');

/* ESCONDE AO CARREGAR */

window.addEventListener('load', () => {

  setTimeout(() => {
    loader.classList.add('hide');
  }, 500);

});

/* MOSTRA AO NAVEGAR */

document.querySelectorAll('a').forEach(link => {

  const href = link.getAttribute('href');

  if (
    href &&
    !href.startsWith('#') &&
    !href.startsWith('http') &&
    !link.hasAttribute('target')
  ) {

    link.addEventListener('click', () => {
      loader.classList.remove('hide');
    });

  }

});

</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const counters = document.querySelectorAll("[data-count]");

  const animateCounter = (counter) => {
    const target = Number(counter.dataset.count);
    const duration = 1400;
    const start = performance.now();

    const update = (now) => {
      const progress = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      counter.textContent = Math.floor(eased * target);

      if (progress < 1) {
        requestAnimationFrame(update);
      } else {
        counter.textContent = target;
      }
    };

    requestAnimationFrame(update);
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting && !entry.target.dataset.animated) {
        entry.target.dataset.animated = "true";
        animateCounter(entry.target);
      }
    });
  }, { threshold: 0.5 });

  counters.forEach((counter) => observer.observe(counter));
});
</script>
<script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>

</html>
